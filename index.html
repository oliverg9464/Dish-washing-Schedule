<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dish Washing Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── SHARED FORM ATOMS ─────────────────── */
    .field-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #64748b;
      margin-top: 8px;
      display: block;
    }

    .text-input {
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .text-input:focus { border-color: #6366f1; }

    .num-input {
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.92rem;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s;
      width: 72px;
      text-align: right;
    }
    .num-input:focus { border-color: #6366f1; }

    .primary-btn {
      padding: 13px;
      background: #6366f1;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .primary-btn:hover    { background: #4338ca; }
    .primary-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .ghost-btn {
      padding: 9px 16px;
      background: #fff;
      color: #475569;
      font-size: 0.88rem;
      font-weight: 600;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .ghost-btn:hover { border-color: #6366f1; color: #6366f1; }

    .error-msg {
      color: #f43f5e;
      font-size: 0.8rem;
      text-align: center;
      min-height: 1em;
    }

    /* ── SETUP SCREEN ──────────────────────── */
    #screen-setup {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .setup-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 36px 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .setup-card h1 {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #0f172a;
    }

    .setup-subtitle {
      text-align: center;
      color: #94a3b8;
      font-size: 0.82rem;
      margin-bottom: 8px;
    }

    .member-row { display: flex; gap: 8px; }
    .member-row .text-input { flex: 1; }

    /* Meals config on setup */
    .meals-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }

    .meal-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .meal-row .text-input { flex: 1; padding: 8px 12px; font-size: 0.88rem; }
    .meal-row .num-input  { width: 68px; padding: 8px 8px; font-size: 0.88rem; }
    .meal-row .unit       { font-size: 0.8rem; color: #94a3b8; font-weight: 600; flex-shrink: 0; }

    .remove-btn {
      width: 26px; height: 26px;
      border: none; border-radius: 50%;
      background: #f1f5f9; color: #94a3b8;
      font-size: 0.85rem; cursor: pointer;
      flex-shrink: 0; line-height: 26px; text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .remove-btn:hover { background: #fee2e2; color: #f43f5e; }

    .add-meal-btn {
      align-self: flex-start;
      font-size: 0.8rem;
      font-weight: 700;
      color: #6366f1;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0;
    }
    .add-meal-btn:hover { text-decoration: underline; }

    /* or divider */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #cbd5e1;
      font-size: 0.8rem;
      font-weight: 600;
      margin: 8px 0 4px;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .join-row { display: flex; gap: 8px; }
    .join-row .text-input { flex: 1; padding: 10px 12px; font-size: 0.88rem; }
    .join-row .ghost-btn  { flex-shrink: 0; white-space: nowrap; }

    /* ── APP SCREEN ────────────────────────── */
    #screen-app { width: 100%; display: none; justify-content: center; }

    .app {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 28px 28px 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f172a;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 11px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: #fff;
      color: #64748b;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .icon-btn:hover  { border-color: #6366f1; color: #6366f1; }
    .icon-btn.copied { border-color: #22c55e; color: #22c55e; }

    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: #cbd5e1; transition: background 0.3s;
    }
    .sync-dot.synced { background: #22c55e; }
    .sync-dot.saving { background: #f59e0b; animation: blink 1s infinite; }
    .sync-dot.error  { background: #f43f5e; }
    .sync-dot.local  { background: #94a3b8; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .subtitle { font-size: 0.76rem; color: #94a3b8; margin-bottom: 20px; }

    .fid-error {
      background: #fff1f2; border: 1px solid #fecdd3; border-radius: 10px;
      padding: 12px 16px; color: #f43f5e; font-size: 0.84rem;
      text-align: center; margin-bottom: 20px; display: none;
    }
    .fid-error a { color: #6366f1; text-decoration: underline; }

    /* ── SETTINGS OVERLAY ──────────────────── */
    #settings-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .settings-modal {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .settings-header {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    .settings-header h2 { font-size: 1.1rem; font-weight: 700; color: #0f172a; flex: 1; }

    .close-btn {
      width: 30px; height: 30px; border: none; border-radius: 50%;
      background: #f1f5f9; color: #64748b; font-size: 1rem;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s;
    }
    .close-btn:hover { background: #e2e8f0; }

    .settings-meals { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }

    .settings-footer {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .settings-footer .primary-btn { flex: 1; padding: 11px; font-size: 0.9rem; }
    .settings-footer .ghost-btn   { padding: 9px 20px; }

    #settings-error { color: #f43f5e; font-size: 0.8rem; text-align: center; min-height: 1em; }

    /* ── SCALE ─────────────────────────────── */
    .scale-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 22px; }
    #scale-beam { transition: transform 0.7s cubic-bezier(0.34, 1.4, 0.64, 1); }
    .scale-labels { width: 300px; display: flex; justify-content: space-between; padding: 0 8px; margin-top: 8px; }
    .scale-label { text-align: center; }
    .scale-name  { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #64748b; margin-bottom: 2px; }
    .scale-score { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.01em; }
    .scale-score.ahead  { color: #22c55e; }
    .scale-score.behind { color: #f43f5e; }
    .scale-score.even   { color: #94a3b8; }
    .balance-note { margin-top: 6px; font-size: 0.75rem; color: #94a3b8; text-align: center; min-height: 1.1em; }

    /* ── DATE ──────────────────────────────── */
    .date-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 18px; }
    .date-label { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #94a3b8; }
    .date-input { border: 2px solid #e2e8f0; border-radius: 8px; padding: 6px 12px; font-size: 0.92rem; color: #334155; outline: none; cursor: pointer; transition: border-color 0.15s; }
    .date-input:focus { border-color: #6366f1; }

    /* ── PERSON CARDS ──────────────────────── */
    .people-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .person-card { flex: 1; border: 2px solid #e2e8f0; border-radius: 14px; padding: 16px 14px; }
    .person-card-name { font-size: 1rem; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 12px; }

    .meal-btn {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border: 2px solid #e2e8f0; border-radius: 10px;
      background: #fff; cursor: pointer; font-size: 0.875rem; font-weight: 600;
      color: #475569; margin-bottom: 8px;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .meal-btn:last-child { margin-bottom: 0; }
    .meal-btn:hover { border-color: #6366f1; color: #6366f1; }
    .meal-btn.done { background: #eef2ff; border-color: #6366f1; color: #4338ca; }

    .meal-tag { font-size: 0.7rem; padding: 2px 7px; border-radius: 20px; background: #f1f5f9; color: #94a3b8; font-weight: 600; }
    .meal-btn.done .meal-tag { background: #c7d2fe; color: #4338ca; }

    /* ── HISTORY ───────────────────────────── */
    .divider { height: 2px; background: #f1f5f9; margin-bottom: 16px; }
    .section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; margin-bottom: 10px; }
    .history-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f8fafc; }
    .history-row:last-child { border-bottom: none; }
    .h-date { min-width: 52px; font-size: 0.78rem; font-weight: 600; color: #94a3b8; padding-top: 4px; }
    .h-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .h-chip { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 3px 10px; font-size: 0.76rem; color: #475569; }
    .empty-history { text-align: center; color: #cbd5e1; font-size: 0.84rem; padding: 8px 0; }

    /* ── ANIMATIONS ────────────────────────── */
    @keyframes disc-drop {
      0%   { opacity:0; transform:translateY(-14px) scaleY(0.5); }
      60%  { opacity:1; transform:translateY(3px)   scaleY(1.05); }
      100% { opacity:1; transform:translateY(0)     scaleY(1); }
    }
    .w-disc-new { animation: disc-drop 0.32s cubic-bezier(0.34,1.4,0.64,1); }

    @keyframes score-pop {
      0%  { transform:scale(1); }
      35% { transform:scale(1.45); }
      65% { transform:scale(0.92); }
      100%{ transform:scale(1); }
    }
    .score-pop { animation: score-pop 0.4s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes float-up {
      0%   { opacity:1; transform:translateY(0) scale(1); }
      100% { opacity:0; transform:translateY(-52px) scale(0.85); }
    }
    .float-label { position:fixed; font-size:0.9rem; font-weight:800; pointer-events:none; z-index:999; animation:float-up 0.75s ease-out forwards; }
    .float-label.add    { color:#22c55e; }
    .float-label.remove { color:#f43f5e; }

    @keyframes plate-glow { 0%,100%{opacity:1} 40%{opacity:0.3} }
    .plate-flash { animation:plate-glow 0.45s ease; }
  </style>
</head>
<body>

  <!-- ══ SETUP SCREEN ══════════════════════════════ -->
  <div id="screen-setup">
    <div class="setup-card">
      <h1>Dish Washing Tracker</h1>
      <p class="setup-subtitle">Create a family to start tracking</p>

      <label class="field-label">Family name</label>
      <input type="text" id="setup-family-name" class="text-input"
             placeholder="e.g. Oliver &amp; Claire" maxlength="40" />

      <label class="field-label">Two members</label>
      <div class="member-row">
        <input type="text" id="setup-member-0" class="text-input" placeholder="Person 1" maxlength="20" />
        <input type="text" id="setup-member-1" class="text-input" placeholder="Person 2" maxlength="20" />
      </div>

      <label class="field-label">Meals &amp; weights</label>
      <div class="meals-list" id="setup-meals-list"></div>
      <button class="add-meal-btn" id="setup-add-meal">+ Add meal</button>

      <button class="primary-btn" id="setup-btn" style="margin-top:14px">Create Family</button>
      <div class="error-msg" id="setup-error"></div>

      <!-- Join existing family -->
      <div class="or-divider">or join an existing family</div>
      <label class="field-label">Invite link</label>
      <div class="join-row">
        <input type="text" id="join-input" class="text-input" placeholder="Paste invite link here" />
        <button class="ghost-btn" id="join-btn">Join</button>
      </div>
      <div class="error-msg" id="join-error"></div>
    </div>
  </div>

  <!-- ══ APP SCREEN ════════════════════════════════ -->
  <div id="screen-app">
    <div class="app">

      <div id="fid-error" class="fid-error">
        Family not found. <a href="?">Create a new one.</a>
      </div>

      <div class="header">
        <h1 id="app-title">Dish Washing Tracker</h1>
        <button id="settings-btn" class="icon-btn" title="Settings">⚙ Edit</button>
        <button id="share-btn"    class="icon-btn" title="Copy invite link">Share</button>
        <div    id="sync-dot"     class="sync-dot" title=""></div>
      </div>
      <p class="subtitle" id="subtitle">Live — shared across devices</p>

      <div class="scale-section">
        <svg width="300" height="110" viewBox="0 0 300 110">
          <line x1="150" y1="46" x2="150" y2="106" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
          <circle cx="150" cy="46" r="6" fill="#64748b"/>
          <g id="scale-beam">
            <line x1="58" y1="46" x2="242" y2="46" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
            <line x1="58" y1="46" x2="58" y2="68" stroke="#94a3b8" stroke-width="2"/>
            <ellipse id="plate-0" cx="58" cy="68" rx="26" ry="5" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1.5"/>
            <g id="weights-0"></g>
            <line x1="242" y1="46" x2="242" y2="68" stroke="#94a3b8" stroke-width="2"/>
            <ellipse id="plate-1" cx="242" cy="68" rx="26" ry="5" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="1.5"/>
            <g id="weights-1"></g>
          </g>
        </svg>
        <div class="scale-labels">
          <div class="scale-label">
            <span class="scale-name" id="scale-name-0">—</span>
            <span id="score-0" class="scale-score even">0.0</span>
          </div>
          <div class="scale-label">
            <span class="scale-name" id="scale-name-1">—</span>
            <span id="score-1" class="scale-score even">0.0</span>
          </div>
        </div>
        <div id="balance-note" class="balance-note"></div>
      </div>

      <div class="date-row">
        <span class="date-label">Date</span>
        <input type="date" id="date-input" class="date-input" />
      </div>

      <div class="people-row" id="people-row"></div>

      <div class="divider"></div>
      <div class="section-title">Recent Days</div>
      <div id="history"></div>
    </div>
  </div>

  <!-- ══ SETTINGS MODAL ════════════════════════════ -->
  <div id="settings-overlay">
    <div class="settings-modal">
      <div class="settings-header">
        <h2>Settings</h2>
        <button class="close-btn" id="settings-close">✕</button>
      </div>

      <label class="field-label">Family name</label>
      <input type="text" id="settings-name" class="text-input" maxlength="40" />

      <label class="field-label" style="margin-top:12px">Meals &amp; weights</label>
      <div class="settings-meals" id="settings-meals-list"></div>
      <button class="add-meal-btn" id="settings-add-meal" style="margin-top:6px">+ Add meal</button>

      <div class="error-msg" id="settings-error" style="margin-top:6px"></div>

      <div class="settings-footer">
        <button class="ghost-btn"   id="settings-cancel">Cancel</button>
        <button class="primary-btn" id="settings-save">Save changes</button>
      </div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════
       CONFIG
    ═══════════════════════════════════════ */
    const FIREBASE_URL = "https://oliver-and-claire-dinner-default-rtdb.firebaseio.com";

    const DEFAULT_MEALS = [
      { name: 'Dinner', weight: 2.0 },
      { name: 'Lunch',  weight: 1.5 },
    ];

    const DISC_COLORS = [
      { fill: '#6366f1', stroke: '#4338ca' },
      { fill: '#a78bfa', stroke: '#7c3aed' },
      { fill: '#f59e0b', stroke: '#d97706' },
      { fill: '#10b981', stroke: '#059669' },
      { fill: '#ec4899', stroke: '#be185d' },
    ];

    /* ─── State ─────────────────────────── */
    let familyId   = null;
    let members    = ['', ''];
    let familyName = '';
    let meals      = JSON.parse(JSON.stringify(DEFAULT_MEALS));
    let log        = {};
    let selectedDate = getToday();
    let sse        = null;
    let prevDiscs  = {};

    /* ─── Helpers ───────────────────────── */
    function getToday() { return new Date().toLocaleDateString('en-CA'); }

    function fmtDate(d) {
      return new Date(d + 'T00:00:00')
        .toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function mealWeight(name) {
      return meals.find(m => m.name === name)?.weight ?? 0;
    }

    function discStyle(mealName) {
      const idx = meals.findIndex(m => m.name === mealName);
      const c   = DISC_COLORS[Math.max(0, idx) % DISC_COLORS.length];
      const meal = meals.find(m => m.name === mealName);
      const w   = meal ? Math.round(Math.min(52, Math.max(28, meal.weight * 14))) : 36;
      return { ...c, w, label: (meal?.weight ?? '?') + 'kg' };
    }

    function totalKg(person) {
      return Object.values(log).reduce((sum, day) => {
        return sum + (day[person] || []).reduce((s, m) => s + mealWeight(m), 0);
      }, 0);
    }

    function getBalance() { return totalKg(members[0]) - totalKg(members[1]); }

    function getMeals(person) { return (log[selectedDate] || {})[person] || []; }

    function generateFid() {
      return Array.from(crypto.getRandomValues(new Uint8Array(5)))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function getFid() {
      return new URLSearchParams(window.location.search).get('fid');
    }

    function extractFid(val) {
      val = val.trim();
      try {
        const url = new URL(val);
        const fid = url.searchParams.get('fid');
        if (fid) return fid;
      } catch {}
      // Raw fid (hex string, 8-12 chars)
      const m = val.match(/[a-f0-9]{8,12}/i);
      return m ? m[0].toLowerCase() : null;
    }

    /* ─── Firebase ──────────────────────── */
    function fbUrl(path) {
      return `${FIREBASE_URL}/families/${familyId}/${path}.json`;
    }

    async function loadFamilyMeta() {
      const res  = await fetch(`${FIREBASE_URL}/families/${familyId}.json`);
      const data = await res.json();
      if (!data) return false;
      familyName = data.name    || 'Family';
      members    = data.members || ['Person 1', 'Person 2'];
      meals      = data.meals   || JSON.parse(JSON.stringify(DEFAULT_MEALS));
      log        = data.log     || {};
      return true;
    }

    async function createFamily(name, m0, m1, mealList) {
      const fid = generateFid();
      await fetch(`${FIREBASE_URL}/families/${fid}.json`, {
        method: 'PUT',
        body: JSON.stringify({ name, members: [m0, m1], meals: mealList, log: {} }),
        headers: { 'Content-Type': 'application/json' },
      });
      window.location.href = `?fid=${fid}`;
    }

    async function saveMeals(date, person, mealArr) {
      setSyncState('saving', 'Saving…');
      try {
        const path = `log/${date}/${person}`;
        if (mealArr.length === 0) {
          await fetch(fbUrl(path), { method: 'DELETE' });
        } else {
          await fetch(fbUrl(path), {
            method: 'PUT',
            body: JSON.stringify(mealArr),
            headers: { 'Content-Type': 'application/json' },
          });
        }
      } catch { setSyncState('error', 'Failed to save'); }
    }

    function listenForUpdates() {
      if (sse) sse.close();
      sse = new EventSource(fbUrl('log') + '?stream=1');
      sse.addEventListener('put', e => {
        const { path, data } = JSON.parse(e.data);
        if (path === '/') {
          log = data || {};
        } else {
          const parts = path.slice(1).split('/');
          let node = log;
          for (let i = 0; i < parts.length - 1; i++) {
            if (!node[parts[i]]) node[parts[i]] = {};
            node = node[parts[i]];
          }
          if (data === null) delete node[parts.at(-1)];
          else node[parts.at(-1)] = data;
        }
        setSyncState('synced', 'Live — data shared across devices');
        render();
      });
      sse.onerror = () => setSyncState('error', 'Connection lost — retrying…');
    }

    /* ─── Sync dot ──────────────────────── */
    function setSyncState(state, tip) {
      const dot = document.getElementById('sync-dot');
      if (dot) { dot.className = 'sync-dot ' + state; dot.title = tip; }
    }

    /* ─── Effects ───────────────────────── */
    function spawnFloatLabel(btn, text, adding) {
      const rect = btn.getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'float-label ' + (adding ? 'add' : 'remove');
      el.textContent = text;
      el.style.left = (rect.left + rect.width / 2 - 20) + 'px';
      el.style.top  = (rect.top + window.scrollY - 4) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function popScore(person) {
      const idx = members.indexOf(person);
      const el  = document.getElementById('score-' + idx);
      if (!el) return;
      el.classList.remove('score-pop'); void el.offsetWidth;
      el.classList.add('score-pop');
      el.addEventListener('animationend', () => el.classList.remove('score-pop'), { once: true });
    }

    function flashPlate(person) {
      const idx = members.indexOf(person);
      const el  = document.getElementById('plate-' + idx);
      if (!el) return;
      el.classList.remove('plate-flash'); void el.offsetWidth;
      el.classList.add('plate-flash');
      el.addEventListener('animationend', () => el.classList.remove('plate-flash'), { once: true });
    }

    /* ─── Toggle ────────────────────────── */
    function toggleMeal(person, mealName, btn) {
      const cur    = getMeals(person);
      const adding = !cur.includes(mealName);
      const updated = adding ? [...cur, mealName] : cur.filter(m => m !== mealName);

      if (btn) spawnFloatLabel(btn, (adding ? '+' : '-') + mealWeight(mealName) + 'kg', adding);
      popScore(person);
      flashPlate(person);

      if (!log[selectedDate]) log[selectedDate] = {};
      if (updated.length === 0) delete log[selectedDate][person];
      else log[selectedDate][person] = updated;
      if (Object.keys(log[selectedDate]).length === 0) delete log[selectedDate];

      render();
      saveMeals(selectedDate, person, updated);
    }

    /* ─── Render ────────────────────────── */
    function renderScale() {
      const balance = getBalance();
      const angle   = Math.max(-24, Math.min(24, balance * 3.5));
      const beam    = document.getElementById('scale-beam');
      beam.style.transformOrigin = '150px 46px';
      beam.style.transform       = `rotate(${angle}deg)`;

      const fmt = v => (v > 0 ? '+' : '') + v.toFixed(1) + 'kg';
      [0, 1].forEach(i => {
        const sign = i === 0 ? balance : -balance;
        const el   = document.getElementById('score-' + i);
        el.textContent = fmt(sign);
        el.className   = 'scale-score ' + (sign > 0.01 ? 'ahead' : sign < -0.01 ? 'behind' : 'even');
      });

      const note = document.getElementById('balance-note');
      if (Math.abs(balance) < 0.01) {
        note.textContent = 'All even!';
      } else {
        const leader = balance > 0 ? members[0] : members[1];
        note.textContent = `${leader} is ahead by ${Math.abs(balance).toFixed(1)}kg`;
      }

      renderWeightDiscs();
    }

    function renderWeightDiscs() {
      const DISC_H = 14, GAP = 2, BASE_Y = 62;
      const PLATE_X = [58, 242];
      members.forEach((person, idx) => {
        const cur    = getMeals(person);
        const sorted = [...cur].sort((a, b) => mealWeight(b) - mealWeight(a));
        if (!prevDiscs[person]) prevDiscs[person] = [];
        const px  = PLATE_X[idx];
        const svg = sorted.map((meal, i) => {
          const s   = discStyle(meal);
          const top = BASE_Y - (i + 1) * (DISC_H + GAP);
          const isNew = !prevDiscs[person].includes(meal);
          return `<g class="${isNew ? 'w-disc-new' : ''}">
            <rect x="${px - s.w / 2}" y="${top}" width="${s.w}" height="${DISC_H}"
              rx="7" fill="${s.fill}" stroke="${s.stroke}" stroke-width="1"/>
            <text x="${px}" y="${top + 9.5}" text-anchor="middle"
              font-size="8.5" font-weight="700" font-family="system-ui,sans-serif"
              fill="white">${s.label}</text>
          </g>`;
        }).join('');
        document.getElementById('weights-' + idx).innerHTML = svg;
        prevDiscs[person] = [...cur];
      });
    }

    function renderPeople() {
      document.getElementById('people-row').innerHTML = members.map(person => {
        const cur  = getMeals(person);
        const btns = meals.map(meal => {
          const done = cur.includes(meal.name);
          return `<button class="meal-btn${done ? ' done' : ''}"
            onclick="toggleMeal('${person}','${meal.name}',this)">
            <span>${done ? meal.name + ' ✓' : meal.name}</span>
            <span class="meal-tag">${meal.weight}kg</span>
          </button>`;
        }).join('');
        return `<div class="person-card">
          <div class="person-card-name">${person}</div>${btns}
        </div>`;
      }).join('');
    }

    function renderHistory() {
      const dates = Object.keys(log)
        .filter(d => Object.values(log[d]).some(m => m.length > 0))
        .sort((a, b) => b.localeCompare(a)).slice(0, 8);
      const el = document.getElementById('history');
      if (!dates.length) { el.innerHTML = '<div class="empty-history">No entries yet</div>'; return; }
      el.innerHTML = dates.map(date => {
        const day   = log[date];
        const chips = members.map(p => {
          const ms = day[p] || [];
          if (!ms.length) return '';
          const kg = ms.reduce((s, m) => s + mealWeight(m), 0);
          return `<span class="h-chip">${p}: ${ms.join(' + ')} (${kg}kg)</span>`;
        }).join('');
        return `<div class="history-row">
          <span class="h-date">${fmtDate(date)}</span>
          <div class="h-chips">${chips}</div>
        </div>`;
      }).join('');
    }

    function render() { renderScale(); renderPeople(); renderHistory(); }

    /* ─── Meal list builder (reused in setup + settings) ─── */
    function buildMealRow(meal, idx, containerId) {
      const row = document.createElement('div');
      row.className = 'meal-row';
      row.innerHTML = `
        <input type="text"   class="text-input meal-name"   value="${meal.name}"   maxlength="20" placeholder="Meal name"/>
        <input type="number" class="num-input  meal-weight" value="${meal.weight}" min="0.1" max="50" step="0.5"/>
        <span class="unit">kg</span>
        <button class="remove-btn" title="Remove">✕</button>`;
      row.querySelector('.remove-btn').addEventListener('click', () => {
        const list = document.getElementById(containerId);
        if (list.querySelectorAll('.meal-row').length > 1) row.remove();
      });
      return row;
    }

    function collectMealsFromList(containerId) {
      return Array.from(document.querySelectorAll(`#${containerId} .meal-row`)).map(row => ({
        name:   row.querySelector('.meal-name').value.trim(),
        weight: parseFloat(row.querySelector('.meal-weight').value) || 1,
      })).filter(m => m.name);
    }

    function populateMealList(containerId, mealList) {
      const el = document.getElementById(containerId);
      el.innerHTML = '';
      mealList.forEach((meal, i) => el.appendChild(buildMealRow(meal, i, containerId)));
    }

    /* ─── Settings modal ─────────────────── */
    function openSettings() {
      document.getElementById('settings-name').value = familyName;
      populateMealList('settings-meals-list', meals);
      document.getElementById('settings-error').textContent = '';
      document.getElementById('settings-overlay').style.display = 'flex';
    }

    function closeSettings() {
      document.getElementById('settings-overlay').style.display = 'none';
    }

    async function saveSettings() {
      const name     = document.getElementById('settings-name').value.trim();
      const newMeals = collectMealsFromList('settings-meals-list');
      const errEl    = document.getElementById('settings-error');

      if (!name)              { errEl.textContent = 'Family name is required.'; return; }
      if (!newMeals.length)   { errEl.textContent = 'Add at least one meal.'; return; }
      errEl.textContent = '';

      const saveBtn = document.getElementById('settings-save');
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';

      try {
        await fetch(`${FIREBASE_URL}/families/${familyId}/name.json`, {
          method: 'PUT', body: JSON.stringify(name),
          headers: { 'Content-Type': 'application/json' },
        });
        await fetch(`${FIREBASE_URL}/families/${familyId}/meals.json`, {
          method: 'PUT', body: JSON.stringify(newMeals),
          headers: { 'Content-Type': 'application/json' },
        });
        familyName = name;
        meals      = newMeals;
        document.getElementById('app-title').textContent = familyName;
        prevDiscs = {};
        render();
        closeSettings();
      } catch {
        errEl.textContent = 'Could not save. Check your connection.';
      } finally {
        saveBtn.disabled = false; saveBtn.textContent = 'Save changes';
      }
    }

    /* ─── Init ──────────────────────────── */
    async function init() {
      familyId = getFid();

      /* ── No fid: setup screen ── */
      if (!familyId) {
        document.getElementById('screen-setup').style.display = 'flex';

        // Pre-populate default meals
        populateMealList('setup-meals-list', DEFAULT_MEALS);

        document.getElementById('setup-add-meal').addEventListener('click', () => {
          const list = document.getElementById('setup-meals-list');
          list.appendChild(buildMealRow({ name: '', weight: 1 }, list.children.length, 'setup-meals-list'));
        });

        document.getElementById('setup-btn').addEventListener('click', async () => {
          const name = document.getElementById('setup-family-name').value.trim();
          const m0   = document.getElementById('setup-member-0').value.trim();
          const m1   = document.getElementById('setup-member-1').value.trim();
          const mealList = collectMealsFromList('setup-meals-list');
          const err  = document.getElementById('setup-error');

          if (!name || !m0 || !m1)   { err.textContent = 'Please fill in all three fields.'; return; }
          if (m0.toLowerCase() === m1.toLowerCase()) { err.textContent = 'Members must have different names.'; return; }
          if (!mealList.length)       { err.textContent = 'Add at least one meal.'; return; }
          err.textContent = '';

          const btn = document.getElementById('setup-btn');
          btn.disabled = true; btn.textContent = 'Creating…';
          try {
            await createFamily(name, m0, m1, mealList);
          } catch {
            err.textContent = 'Could not reach the database. Check your connection.';
            btn.disabled = false; btn.textContent = 'Create Family';
          }
        });

        // Join by link
        document.getElementById('join-btn').addEventListener('click', () => {
          const val = document.getElementById('join-input').value;
          const fid = extractFid(val);
          const err = document.getElementById('join-error');
          if (fid) {
            window.location.href = `?fid=${fid}`;
          } else {
            err.textContent = 'Could not find a valid invite link. Try pasting the full URL.';
          }
        });

        // Allow pressing Enter in join input
        document.getElementById('join-input').addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('join-btn').click();
        });

        return;
      }

      /* ── fid present: app screen ── */
      document.getElementById('screen-app').style.display = 'flex';
      setSyncState('saving', 'Loading…');

      let found;
      try { found = await loadFamilyMeta(); }
      catch { found = false; }

      if (!found) {
        document.getElementById('fid-error').style.display = 'block';
        setSyncState('error', 'Family not found');
        return;
      }

      document.getElementById('app-title').textContent        = familyName;
      document.getElementById('scale-name-0').textContent     = members[0].toUpperCase();
      document.getElementById('scale-name-1').textContent     = members[1].toUpperCase();

      // Share
      document.getElementById('share-btn').addEventListener('click', () => {
        navigator.clipboard.writeText(window.location.href).then(() => {
          const btn = document.getElementById('share-btn');
          btn.textContent = 'Copied!'; btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Share'; btn.classList.remove('copied'); }, 1800);
        });
      });

      // Settings
      document.getElementById('settings-btn').addEventListener('click', openSettings);
      document.getElementById('settings-close').addEventListener('click', closeSettings);
      document.getElementById('settings-cancel').addEventListener('click', closeSettings);
      document.getElementById('settings-save').addEventListener('click', saveSettings);
      document.getElementById('settings-overlay').addEventListener('click', e => {
        if (e.target === document.getElementById('settings-overlay')) closeSettings();
      });
      document.getElementById('settings-add-meal').addEventListener('click', () => {
        const list = document.getElementById('settings-meals-list');
        list.appendChild(buildMealRow({ name: '', weight: 1 }, list.children.length, 'settings-meals-list'));
      });

      // Date picker
      const di = document.getElementById('date-input');
      di.value = selectedDate; di.max = getToday();
      di.addEventListener('change', e => { selectedDate = e.target.value; render(); });

      setSyncState('synced', 'Live — data shared across devices');
      listenForUpdates();
      render();
    }

    init();
  </script>
</body>
</html>
